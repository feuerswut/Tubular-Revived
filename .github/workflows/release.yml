name: Release

on:
  workflow_dispatch:
    inputs:
      title:
        type: string
        description: 'Title'
        required: true
        default: 'v0.00.0 R0'
      is_pre_release:
        type: boolean
        description: 'Set as a pre-release'
        required: true
        default: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout branch "${{ github.ref_name }}"
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Checkout Tubular-Extractor-Revived
        uses: actions/checkout@v6
        with:
          repository: feuerswut/Tubular-Extractor-Revived
          path: Tubular-Extractor-Revived

      - uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: "temurin"
          cache: 'gradle'

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Sign APK
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: |
          version=$(grep 'versionName[[:space:]]*=' app/build.gradle.kts | grep -o '"[^"]*"' | head -n 1 | tr -d '"')
          echo "${KEYSTORE}" | base64 -d > apksign.keystore
          ${ANDROID_HOME}/build-tools/34.0.0/apksigner sign --ks apksign.keystore --ks-pass env:SIGNING_STORE_PASSWORD "app/build/outputs/apk/release/app-release-unsigned.apk"
          mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/"tubular_v${version}.apk"

      - name: Create release and upload
        run: |
          version=$(grep 'versionName[[:space:]]*=' app/build.gradle.kts | grep -o '"[^"]*"' | head -n 1 | tr -d '"')
          gh auth login --with-token <<<"${{ secrets.GITHUB_TOKEN }}"
          gh release create "v${version}" --title "${{ inputs.title }}" --notes-file ".github/changelog.md" --prerelease=${{ inputs.is_pre_release }} --repo ${{ github.repository }}
          gh release upload "v${version}" app/build/outputs/apk/release/*.apk --repo ${{ github.repository }}

      - name: Archive reports for job
        uses: actions/upload-artifact@v7
        with:
          name: reports
          path: '*/build/reports'
        if: ${{ always() }}
